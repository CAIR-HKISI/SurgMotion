cpus_per_task: 4
eval_name: surgical_video_classification_frozen
folder: logs/cpt_cholec80/cpt_vith16-256px-64f_lr1e-4_epoch-20
mem_per_gpu: 220G
nodes: 1
max_workers: 4
resume_checkpoint: true
tag: ssv2-vih16-16x2x3-16f
tasks_per_node: 1
experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type:  surgical_videodataset
    dataset_train: data/Surge_Frames/Cholec80/clips_64f/train_dense_64f_detailed.csv
    dataset_val: data/Surge_Frames/Cholec80/clips_64f/test_dense_64f_detailed.csv
    frames_per_clip: 64
    num_classes: 7
    num_segments: 1
    num_views_per_segment: 1
    resolution: 256
  optimization:
    batch_size: 32
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.0
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.0
    num_epochs: 1
    use_bfloat16: true
    use_pos_embed: false
model_kwargs:
  checkpoint: logs/cpt_cholec80/cpt_vith16-256px-64f_lr1e-4_epoch-20/latest.pt
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_huge
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
