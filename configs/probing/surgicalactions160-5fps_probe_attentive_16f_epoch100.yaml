cpus_per_task: 2
eval_name: surgical_video_probing
folder: logs/cpt_surgaction160/surgaction160_vitl16-256px-64f_multi-head
dataset: surgaction160_action
mem_per_gpu: 220G
nodes: 1
max_workers: 4
num_workers: 8
resume_checkpoint: false
tag: surgaction160-action-recognition
tasks_per_node: 1

# Bootstrap configuration (default: enabled)
use_bootstrap: true
n_bootstrap: 1000
bootstrap_seed: 42

# wandb configuration
wandb:
  project: nsjepa-probing  # Your wandb project name
  entity: nsjepa  # Your wandb username or team (optional, uses default if null)
  name: surgaction160_action_recognition  # Run name (optional, wandb will generate if null)
  tags:
    - surgaction160
    - action-recognition
    - vitl
  group: null  # Group name for grouping related runs (optional)
  notes: "Multi-head probing on SurgAction160 dataset for action recognition with bootstrap uncertainty estimation"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_videodataset

    # SurgAction160 dataset paths
    dataset_train:
    - data/Surge_Frames/SurgicalActions160_v1/train_metadata_fold0_fps5.csv

    dataset_val:
    - data/Surge_Frames/SurgicalActions160_v1/test_metadata_fold0_fps5.csv

    # Number of classes for SurgAction160
    num_classes:
    - 16   # SurgAction160 has 16 action classes

    frames_per_clip: 16
    num_segments: 1
    num_views_per_segment: 1
    resolution: 256

  optimization:
    batch_size: 8
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.4
    num_epochs: 100
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  checkpoint: /home/jinlin_wu/NSJepa/logs9/surgical_cpt_vitl16-256px-64f_lr1e-20_epoch_21-dataset/latest.pt
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
