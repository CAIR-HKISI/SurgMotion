cpus_per_task: 4
eval_name: foundation_phase_probing
folder: logs/foundation/videomaev2_giant_aixsuture
mem_per_gpu: 220G
nodes: 1
max_workers: 4
resume_checkpoint: true
tag: videomaev2_giant_64f_aixsuture
tasks_per_node: 1
task_type: action

# wandb configuration
wandb:
  project: foundation-model-probing  # Your wandb project name
  entity: nsjepa  # Your wandb username or team (optional, uses default if null)
  name: videomaev2_giant_64f_aixsuture
  tags:
    - AIxsuture
    - phase-probing
    - videomaev2_giant-64f
  group: null  # Group name for grouping related runs (optional)
  notes: "Multi-head probing on AIxsuture dataset with VideoMAEv2 Giant"

experiment:
