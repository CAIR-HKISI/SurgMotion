        warmup: 0.0
        weight_decay: 0.1
      - final_lr: 0.0
        final_weight_decay: 0.1
        lr: 0.001
        start_lr: 0.001
        warmup: 0.0
        weight_decay: 0.1
      - final_lr: 0.0
        final_weight_decay: 0.1
        lr: 0.0003
        start_lr: 0.0003
