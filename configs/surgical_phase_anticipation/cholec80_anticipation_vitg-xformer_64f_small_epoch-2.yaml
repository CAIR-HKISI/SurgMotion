# Cholec80 phase anticipation probe training config.
# 默认冻结 encoder，仅训练 joint anticipation heads:
#   - regression branch fits normalized targets in [0, 1]
#   - classification branch fits 3 horizon states
# 原始 CSV `ant_reg_*` 语义:
#   - 0.0: present
#   - 0 < v < anticipation_horizon: inside_horizon
#   - v >= anticipation_horizon: outside_horizon

cpus_per_task: 4
eval_name: surgical_phase_anticipation
dataset: cholec80_phase_anticipation
folder: logs/surgical_phase_anticipation/cholec80
mem_per_gpu: 120G
nodes: 1
max_workers: 4
num_workers: 8
resume_checkpoint: false
tag: cholec80_phase_anticipation_vitg-xformer_64f_small_epoch-2
tasks_per_node: 1

task_type: anticipation
# Shared horizon threshold used to:
#   - normalize raw `ant_reg_*` targets for regression
#   - derive present / outside / inside horizon states
#   - rescale predictions back to the raw benchmark units for MAE
anticipation_horizon: 5.0

wandb:
  project: nsjepa-surgical-anticipation
  entity: null
  name: cholec80_phase_anticipation_vitg-xformer_64f_small_epoch-2
  tags:
    - cholec80
    - phase-anticipation
    - vitg-xformer
    - 64f
    - small
    - epoch-2
  group: surgical-phase-anticipation
  notes: "Frozen ViT Giant xFormers encoder with attentive regressor heads for Cholec80 phase anticipation on a small fixed CSV split, trained for 2 epochs."

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_anticipation_dataset
    dataset_train:
      - data/Surge_Frames/Cholec80/clips_64f_anticipation/train_dense_64f_detailed_small.csv
    dataset_val:
      - data/Surge_Frames/Cholec80/clips_64f_anticipation/val_dense_64f_detailed_small.csv
    target_names:
      - Preparation
      - CalotTriangleDissection
      - ClippingCutting
      - GallbladderDissection
      - GallbladderPackaging
      - CleaningCoagulation
      - GallbladderRetraction
    num_classes: 7
    frames_per_clip: 64
    num_segments: 1
    num_views_per_segment: 1
    resolution: 256

  optimization:
    batch_size: 12
    num_epochs: 2
    use_bfloat16: true
    # Total loss = regression MSE + horizon_ce_weight * 3-state CE.
    horizon_ce_weight: 0.1
    loss:
      type: mse
    multihead_kwargs:
      - final_lr: 0.0
        final_weight_decay: 0.01
        lr: 0.005
        start_lr: 0.005
        warmup: 0.0
        weight_decay: 0.01
