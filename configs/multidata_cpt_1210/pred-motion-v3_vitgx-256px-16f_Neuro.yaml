app: vjepa_pred
cpus_per_task: 16
folder: logs/pred-motion-v3_vitgx-256px-16f_Neuro
mem_per_gpu: 220G
nodes: 1
tasks_per_node: 1
data:
  dataset_type: surgical_videodataset
  datasets:

  ### NeuroSurgery dataset
  - data/Surge_Frames/PitVis/clips_16f/train_dense_16f_detailed.csv
  - data/Surge_Frames/Private_PWH_TSS_79/clips_16f/unlabeled_dense_16f_detailed.csv
  - data/Surge_Frames/Private_PUMCH/clips_16f/unlabeled_dense_16f_detailed.csv
  - data/Surge_Frames/Private_HKU-TSS/clips_64f/unlabeled_dense_64f_detailed.csv
  - data/Surge_Frames/Private_HKU-SZH_Brain_Open_Surgery/clips_64f/unlabeled_dense_64f_detailed.csv


  datasets_weights:

  - 0.20
  - 0.20
  - 0.20
  - 0.20
  - 0.20


  batch_size: 64
  crop_size: 256
  dataset_fpcs:
  - 16
  - 16
  - 16
  - 16
  - 16

  fps: 1
  num_workers: 4
  patch_size: 16
  persistent_workers: true
  pin_mem: true
  tubelet_size: 2

data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 0.75
  - 1.35
  random_resize_scale:
  - 0.3
  - 1.0
  reprob: 0.0


loss:
  motion_loss_weight: 1.0
  jepa_loss:
    metric: generalized_mean
    metric_p: 2.0
    multiscale:
      enable: false
      layers: [1.0]
      weights: [1.0]
    params:
      eps: 1.0e-06
  motion_loss:
    metric: smooth_l1
    params:
      beta: 1.0
      pos_weight: 10.0

mask:
- aspect_ratio:
  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 8
  spatial_scale:
  - 0.15
  - 0.15
  temporal_scale:
  - 1.0
  - 1.0
- aspect_ratio:
  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 2
  spatial_scale:
  - 0.7
  - 0.7
  temporal_scale:
  - 1.0
  - 1.0
meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: false
  read_checkpoint: None
  save_every_freq: 5
  seed: 239
  use_sdpa: true
model:
  model_name: vit_giant_xformers
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true
  cpt_ckeckpoint: ckpts/vitg.pt 
  use_extrinsics: false
optimization:
  anneal_ckpt: None
  ema:
  - 0.99925
  - 0.99925
  epochs: 600
  final_lr: 0.000525
  final_weight_decay: 0.04
  ipe: 300
  ipe_scale: 1.25
  lr: 0.000525
  start_lr: 0.0001
  warmup: 40
  weight_decay: 0.04

wandb:
  project: nsjepa-motion-pred
  entity: nsjepa
  name: motion-pred_vitgx-256px-16f_Neuro
  tags: [Neuro]
  group: Neuro
  notes: "Motion Prediction Neuro"
