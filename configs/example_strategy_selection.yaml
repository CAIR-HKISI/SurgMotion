app: vjepa_cpt
cpus_per_task: 8
folder: logs/example_strategy_selection
mem_per_gpu: 220G
nodes: 1
tasks_per_node: 1

data:
  dataset_type: surgical_videodataset
  datasets:
  - data/Surge_Frames/Cholec80/clips_64f/train_dense_64f_detailed.csv
  datasets_weights:
  - 1.0
  batch_size: 64
  crop_size: 256
  dataset_fpcs:
  - 64
  fps: 1
  num_workers: 4
  patch_size: 16
  persistent_workers: true
  pin_mem: true
  tubelet_size: 2

data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 0.75
  - 1.35
  random_resize_scale:
  - 0.3
  - 1.0
  reprob: 0.0

loss:
  loss_exp: 1.0

# 配置多个masking策略
mask:
# 策略1: 窗口预测策略（8个窗口）
- num_windows: 8
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  inv_block: false

# 策略2: 传统的block mask策略
- aspect_ratio:
  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 2
  spatial_scale:
  - 0.7
  - 0.7
  temporal_scale:
  - 1.0
  - 1.0

# 策略选择配置
# 选项1: 使用所有策略（默认）
mask_strategy_selection: "all"

# 选项2: 每个batch随机选择一个策略
# mask_strategy_selection: "random"

# 选项3: 按权重选择策略（需要配置权重）
# mask_strategy_selection: "weighted"
# mask_strategy_weights: [0.5, 0.5]  # 对应上面的2个策略的权重

meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: false
  read_checkpoint: None
  save_every_freq: 5
  seed: 239
  use_sdpa: true

model:
  model_name: vit_base
  pred_depth: 6
  pred_embed_dim: 256
  pred_num_heads: 8
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true

optimization:
  ema:
  - 0.99925
  - 0.99925
  epochs: 10
  final_lr: 0.000525
  final_weight_decay: 0.04
  ipe: 300
  ipe_scale: 1.25
  lr: 0.000525
  start_lr: 0.0001
  warmup: 40
  weight_decay: 0.04

