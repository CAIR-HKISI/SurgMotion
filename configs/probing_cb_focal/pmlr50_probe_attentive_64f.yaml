cpus_per_task: 2
eval_name: surgical_phase_probing
dataset: pmlr50_phase  # Dataset name for wandb logging
folder: logs9/neuro_cpt_vitl16-256px-64f_lr1e-4_epoch-10_neurosurgical
mem_per_gpu: 220G
nodes: 1
max_workers: 4
num_workers: 8
resume_checkpoint: false
tag: pmlr50-probing
tasks_per_node: 1

# Bootstrap configuration (default: enabled)
use_bootstrap: true
n_bootstrap: 1000
bootstrap_seed: 42

# wandb configuration
wandb:
  project: nsjepa-probing-cb-softmax  # Your wandb project name
  entity: nsjepa  # Your wandb username or team (optional, uses default if null)
  name: pmlr50_probing  # Run name (optional, wandb will generate if null)
  tags:
    - pmlr50
    - phase-probing
    - vitl
  group: null  # Group name for grouping related runs (optional)
  notes: "Multi-head probing on pmlr50 dataset with bootstrap uncertainty estimation"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_videodataset

    # Single dataset (PmLR50_phase)
    dataset_train:
    - data/Surge_Frames/PmLR50/clips_64f/train_dense_64f_detailed.csv

    dataset_val:
    - data/Surge_Frames/PmLR50/clips_64f/test_dense_64f_detailed.csv

    # Number of classes for PmLR50_phase
    num_classes:
    - 5  # PmLR50 has 5 phases

    frames_per_clip: 64
    num_segments: 1
    num_views_per_segment: 1
    resolution: 256

  optimization:
    batch_size: 8
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.4
    num_epochs: 1
    use_bfloat16: true
    use_pos_embed: false
    loss:
      type: cb_softmax
      beta: 0.9999
      gamma: 2.0

model_kwargs:
  checkpoint: logs9/neuro_cpt_vitl16-256px-64f_lr1e-4_epoch-10_neurosurgical/latest.pt
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
