app: vjepa
nodes: 1
tasks_per_node: 1
cpus_per_task: 4
mem_per_gpu: 220G
folder: logs/example_mask_last_n_frames

data:
  dataset_type: VideoDataset
  datasets:
  - /path/to/your/dataset.csv
  datasets_weights:
  - 1.0
  batch_size: 16
  crop_size: 224
  patch_size: 16
  dataset_fpcs:
  - 16
  tubelet_size: 2
  fps: 4
  num_workers: 4
  persistent_workers: true
  pin_mem: true

data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 0.75
  - 1.35
  random_resize_scale:
  - 0.3
  - 1.0
  reprob: 0.0

loss:
  loss_exp: 1.0

# 新的mask策略配置
mask:
# 策略1: 使用传统的block mask策略
- aspect_ratio:
  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 2
  spatial_scale:
  - 0.15
  - 0.15
  temporal_scale:
  - 1.0
  - 1.0

# 策略2: 使用新的mask最后N帧策略
- mask_last_n_frames: 4  # 随机mask掉最后4帧中的1帧
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0

# 策略3: 使用新的mask最后N帧策略，但mask更多帧
- mask_last_n_frames: 8  # 随机mask掉最后8帧中的1帧
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0

meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: false
  read_checkpoint: null
  save_every_freq: 50
  seed: 239
  use_sdpa: true

model:
  model_name: vit_base
  pred_depth: 6
  pred_embed_dim: 256
  pred_num_heads: 8
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true

optimization:
  ema:
  - 0.99925
  - 0.99925
  epochs: 10
  final_lr: 0.000525
  final_weight_decay: 0.04
  ipe: 300
  ipe_scale: 1.25
  lr: 0.000525
  start_lr: 0.0001
  warmup: 40
  weight_decay: 0.04

