# 视频到视频推理配置文件
app: video_to_video_inference

# 模型配置
model:
  model_name: vit_huge
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true
  use_sdpa: true
  use_silu: false
  use_pred_silu: false
  wide_silu: true

# 数据配置
data:
  dataset_type: videodataset
  crop_size: 256
  patch_size: 16
  dataset_fpcs: [16]  # 每段视频的帧数
  tubelet_size: 2
  fps: 1

# 数据增强配置（推理时使用）
data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio: [0.75, 1.35]
  random_resize_scale: [0.3, 1.0]
  reprob: 0.0

# 推理配置
inference:
  batch_size: 1
  max_frames: null  # 最大处理帧数，null表示处理所有帧
  output_fps: 30    # 输出视频的帧率
  output_format: "mp4"  # 输出视频格式
  preserve_original_resolution: false  # 是否保持原始分辨率
  target_resolution: 256  # 目标分辨率

# 输出配置
output:
  save_intermediate: false  # 是否保存中间结果
  save_features: false      # 是否保存特征
  output_dir: "outputs/video_to_video"  # 输出目录
