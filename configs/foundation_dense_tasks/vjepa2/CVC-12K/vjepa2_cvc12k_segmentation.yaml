eval_name: segmentation_frozen
val_only: true
folder: outputs/task-13-cvc12k-seg
tag: vjepa2_cvc12k_segmentation_smoke
num_workers: 0
resume_checkpoint: false

experiment:
  data:
    dataset_type: cvc12k_segmentation_dataset
    dataset_root: tests/fixtures/cvc12k_seg
    annotation_file: tests/fixtures/cvc12k_seg/pairs_train.txt
    val_annotation: tests/fixtures/cvc12k_seg/pairs_train.txt
    img_size: 32
    normalization:
      - [0.485, 0.456, 0.406]
      - [0.229, 0.224, 0.225]
    pin_memory: false
    persistent_workers: false

  optimization:
    batch_size: 2
    num_epochs: 1
    use_bfloat16: false
    lr: 0.001
    final_lr: 0.0005
    weight_decay: 0.01
    final_weight_decay: 0.005
    warmup: 0.0

  segmentation_head:
    type: maskformer
    patch_size: 16
    target_size: 32
    num_feature_levels: 1
    hidden_dim: 64
    mask_dim: 64
    num_queries: 1
    num_decoder_layers: 2
    nheads: 4
    dim_feedforward: 128
    dropout: 0.0
    decoder_channels: [64, 32]
    upsample_mode: bilinear
    return_aux: true

  loss:
    bce_weight: 1.0
    dice_weight: 1.0
    structure_weight: 0.5
    aux_weight: 0.25

  metrics:
    threshold: 0.5

  logging:
    log_interval: 1
    enable_tensorboard: false

model_kwargs:
  checkpoint: null
  module_name: evals.segmentation_frozen.modelcustom.vit_encoder_segmentation
  pretrain_kwargs:
    encoder:
      model_name: vit_tiny
      checkpoint_key: encoder
      patch_size: 16
      num_frames: 2
  wrapper_kwargs:
    img_as_video_nframes: 2
    out_layers: [11]
