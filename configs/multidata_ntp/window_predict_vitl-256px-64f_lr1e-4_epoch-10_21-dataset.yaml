  - 64
  - 64
  - 64
  - 64

  fps: 1
  num_workers: 4
  patch_size: 16
  persistent_workers: true
  pin_mem: true
  tubelet_size: 2
data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 0.75
  - 1.35
  random_resize_scale:
  - 0.3
  - 1.0
  reprob: 0.0
loss:
  loss_exp: 1.0

# 窗口预测masking策略
# 将输入的帧分成8个窗口，每个窗口预测下一个窗口的token
mask:
- num_windows: 8  # 将帧分成8个窗口，生成7个预测任务（窗口1→窗口2, 窗口2→窗口3, ..., 窗口7→窗口8）
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  inv_block: false

# 策略选择配置（可选）
# mask_strategy_selection: "all"     # 使用所有策略（默认）
# mask_strategy_selection: "random"  # 每个batch随机选择一个策略
# mask_strategy_selection: "weighted" # 按权重选择策略（需要配置 mask_strategy_weights）
# mask_strategy_weights: [0.5, 0.5]  # 每个策略的权重（仅当 strategy_selection="weighted" 时使用）

meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: false
  read_checkpoint: None
  save_every_freq: 5
  seed: 239
  use_sdpa: true
model:
  model_name: vit_large
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true
  cpt_ckeckpoint: ckpts/vitl.pt 
optimization:
  anneal_ckpt: None
  ema:
  - 0.99925
  - 0.99925
  epochs: 20
  final_lr: 1.0e-07
  final_weight_decay: 0.04
  ipe: 600
  ipe_scale: 1.25
  is_anneal: true
  lr: 1.0e-04
  resume_anneal: true
  start_lr: 0.0001
  warmup: 0
  weight_decay: 0.04
