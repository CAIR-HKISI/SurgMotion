  - 0.50

  - 0.50
  - 0.50

  - 0.25
  - 0.25
  - 0.25
  - 0.25
  - 0.25

  - 0.25
  - 0.25
  - 0.25
  - 0.25


  batch_size: 64
  crop_size: 256
  dataset_fpcs:
  - 64
  - 64

  - 64
  - 64
  - 64
  - 64
  - 64
  - 64
  - 64


  - 64
  - 64
  
  - 64
