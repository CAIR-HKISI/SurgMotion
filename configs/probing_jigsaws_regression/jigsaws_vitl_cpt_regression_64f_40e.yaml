      warmup: 0.0
      weight_decay: 0.4
    # Regressor 13
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.4
    # Regressor 14
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
