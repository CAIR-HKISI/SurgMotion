# 评估配置：使用 PitVis 训练的模型评估 TSS 私有数据集
# 用法: 先在 PitVis 上训练，然后使用此配置评估

cpus_per_task: 4
eval_name: foundation_phase_probing
folder: logs/foundation/endomamba_small_eval_private
mem_per_gpu: 220G
nodes: 1
max_workers: 4
resume_checkpoint: true  # 加载 PitVis 训练的 checkpoint
val_only: true  # 只做评估，不训练
tag: eval_tss_from_pitvis
tasks_per_node: 1

# wandb configuration
wandb:
  project: foundation-model-probing
  entity: nsjepa
  name: eval_tss_from_pitvis
  tags:
    - Private_TSS_720p
    - eval-only
    - transfer-from-pitvis
    - endomamba_small-64f
  group: pitvis-transfer-eval
  notes: "Evaluate TSS dataset using model trained on PitVis (full data as val)"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_videodataset
    # train 数据集仍然需要指定（用于初始化），但 val_only 模式下不会使用
    dataset_train: data/Surge_Frames/PitVis/clips_64f/train_dense_64f_detailed.csv
    # 使用合并后的完整数据集进行评估
    dataset_val: data_local/Surge_Frames/Private_TSS_720p/clips_64f/full_dense_64f_detailed.csv
    frames_per_clip: 64
    num_classes: 15  # 必须与 PitVis 训练时一致
    num_segments: 1
    num_views_per_segment: 1
    resolution: 224

  optimization:
    batch_size: 4
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.003
      start_lr: 0.003
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.003
      start_lr: 0.003
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.003
      start_lr: 0.003
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.8
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.8
    num_epochs: 1
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  checkpoint: ckpts_foundation/endomamba_checkpoint-best.pth
  module_name: evals.foundation_phase_probing.modelcustom.foundation_model_wrapper
  model_type: endomamba
  encoder:
    model_name: endomamba_small
  wrapper_kwargs:
    tubelet_size: 2
    max_frames: 128
    use_pos_embed: true

