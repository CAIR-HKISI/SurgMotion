cpus_per_task: 4
eval_name: foundation_phase_probing
dataset: bleeding_detection
folder: logs/foundation/endomamba_small_bleeding
mem_per_gpu: 220G
nodes: 1
max_workers: 4
num_workers: 8
resume_checkpoint: false
tag: endomamba_small_64f_bleeding
tasks_per_node: 1

# Bootstrap configuration (default: enabled)
use_bootstrap: true
n_bootstrap: 1000
bootstrap_seed: 42

# wandb configuration
wandb:
  project: foundation-model-probing  # Your wandb project name
  entity: nsjepa  # Your wandb username or team (optional, uses default if null)
  name: endomamba_small_64f_bleeding
  tags:
    - bleeding
    - phase-probing
    - endomamba_small-64f
  group: null  # Group name for grouping related runs (optional)
  notes: "Multi-head probing on bleeding dataset with EndoMamba Small"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type:  surgical_videodataset
    dataset_train: data/Surge_Frames/Bleeding_Dataset_70_30/clips_64f/train_dense_64f_detailed.csv
    dataset_val: data/Surge_Frames/Bleeding_Dataset_70_30/clips_64f/test_dense_64f_detailed.csv
    frames_per_clip: 64
    num_classes: 2
    num_segments: 1
    num_views_per_segment: 1
    resolution: 224

  optimization:
    batch_size: 4
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
