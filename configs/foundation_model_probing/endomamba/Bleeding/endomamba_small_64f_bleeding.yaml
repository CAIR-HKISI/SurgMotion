model_kwargs:
  checkpoint: ckpts_foundation/endomamba_checkpoint-best.pth
  module_name: evals.foundation_phase_probing.modelcustom.foundation_model_wrapper
  model_type: endomamba
  encoder:
    model_name: endomamba_small
  wrapper_kwargs:
    tubelet_size: 2
    max_frames: 128
    use_pos_embed: true