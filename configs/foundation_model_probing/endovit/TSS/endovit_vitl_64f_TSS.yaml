cpus_per_task: 4
eval_name: foundation_phase_probing
folder: logs/foundation/endovit_vitl_Private_TSS_720p
mem_per_gpu: 220G
nodes: 1
max_workers: 4
resume_checkpoint: true
tag: endovit_vitl_64f_Private_TSS_720p
tasks_per_node: 1

# wandb configuration
wandb:
  project: foundation-model-probing  # Your wandb project name
  entity: nsjepa  # Your wandb username or team (optional, uses default if null)
  name: endovit_vitl_64f_Private_TSS_720p  # Run name (optional, wandb will generate if null)
  tags:
    - Private_TSS_720p
    - phase-probing
    - endovit-vitl-64f
  group: null  # Group name for grouping related runs (optional)
  notes: "Multi-head probing on Private_TSS_720p dataset"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type:  surgical_videodataset
    dataset_train: data/Surge_Frames/Private_TSS_720p/clips_64f/train_dense_64f_detailed.csv
    dataset_val: data/Surge_Frames/Private_TSS_720p/clips_64f/test_dense_64f_detailed.csv
    frames_per_clip: 64
    num_classes: 15
    num_segments: 1
    num_views_per_segment: 1
    resolution: 224

  optimization:
    batch_size: 4
    multihead_kwargs:
