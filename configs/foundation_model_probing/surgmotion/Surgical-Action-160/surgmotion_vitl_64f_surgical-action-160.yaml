cpus_per_task: 4
eval_name: foundation_phase_probing
folder: logs/foundation/surgmotion_vitl_surgical-action-160
mem_per_gpu: 220G
nodes: 1
max_workers: 4
resume_checkpoint: true
tag: surgmotion_vitl_64f_surgical-action-160
tasks_per_node: 1

# Bootstrap configuration (default: enabled)
use_bootstrap: true
n_bootstrap: 1000
bootstrap_seed: 42

metric_aggregation: "global"

# wandb configuration
wandb:
  project: foundation-model-probing
  entity: nsjepa
  name: surgmotion_vitl_64f_surgical-action-160
  tags:
    - Surgical-Action-160
    - phase-probing
    - surgmotion_vitl_64f
  group: null
  notes: "Multi-head probing on Surgical-Action-160 dataset"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_videodataset
    dataset_train:
      - data/Surge_Frames/SurgicalActions160_v1/train_metadata_fold0_fps25.csv
    dataset_val:
      - data/Surge_Frames/SurgicalActions160_v1/test_metadata_fold0_fps25.csv
    frames_per_clip: 64
    num_classes: 16
    num_segments: 1
    num_views_per_segment: 1
    resolution: 256

  optimization:
    batch_size: 4
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.01
