cpus_per_task: 4
eval_name: foundation_phase_probing
folder: logs/foundation/gastronet_vits_cholec80
mem_per_gpu: 220G
nodes: 1
max_workers: 4
resume_checkpoint: true
tag: gastronet_vits_64f_cholec80
tasks_per_node: 1

# Bootstrap configuration (default: enabled)
use_bootstrap: true
n_bootstrap: 1000
bootstrap_seed: 42


# wandb configuration
wandb:
  project: foundation-model-probing
  entity: nsjepa
  name: gastronet_vits_64f_cholec80
  tags:
    - Cholec80
    - phase-probing
    - gastronet_vits_64f
  group: null
  notes: "Multi-head probing on Cholec80 dataset"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_videodataset
    dataset_train: data/Surge_Frames/Cholec80/clips_64f/train_dense_64f_detailed.csv
    dataset_val: data/Surge_Frames/Cholec80/clips_64f/test_dense_64f_detailed.csv
    frames_per_clip: 64
    num_classes: 7
    num_segments: 1
    num_views_per_segment: 1
    resolution: 256

  optimization:
    batch_size: 4
    multihead_kwargs:
