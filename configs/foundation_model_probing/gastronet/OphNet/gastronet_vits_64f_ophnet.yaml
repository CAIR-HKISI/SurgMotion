cpus_per_task: 4
eval_name: foundation_phase_probing
folder: logs/foundation/gastronet_vits_ophnet
mem_per_gpu: 220G
nodes: 1
max_workers: 4
resume_checkpoint: true
tag: gastronet_vits_64f_ophnet
tasks_per_node: 1

# wandb configuration
wandb:
  project: foundation-model-probing
  entity: nsjepa
  name: gastronet_vits_64f_ophnet
  tags:
    - OphNet
    - phase-probing
    - gastronet_vits_64f
  group: null
  notes: "Multi-head probing on OphNet dataset"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_videodataset
    dataset_train: data/Surge_Frames/OphNet2024_phase/clips_64f/train_dense_64f_detailed.csv
    dataset_val: data/Surge_Frames/OphNet2024_phase/clips_64f/test_dense_64f_detailed.csv
    frames_per_clip: 64
    num_classes: 52
    num_segments: 1
    num_views_per_segment: 1
    resolution: 224

