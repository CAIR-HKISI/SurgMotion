cpus_per_task: 4
eval_name: foundation_phase_probing
folder: logs/foundation/surgenet_convnextv2_bleeding
mem_per_gpu: 220G
nodes: 1
max_workers: 4
num_workers: 8
resume_checkpoint: false
tag: surgenet_convnextv2_64f_bleeding
tasks_per_node: 1

# Bootstrap configuration (default: enabled)
use_bootstrap: true
n_bootstrap: 1000
bootstrap_seed: 42

# wandb configuration
wandb:
  project: foundation-model-probing  # Your wandb project name
  entity: nsjepa  # Your wandb username or team (optional, uses default if null)
  name: surgenet_convnextv2_64f_bleeding
  tags:
    - bleeding
    - phase-probing
    - surgenet_convnextv2-64f
  group: null  # Group name for grouping related runs (optional)
  notes: "Multi-head probing on bleeding dataset with SurgeNet ConvNextv2"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type:  surgical_videodataset
    dataset_train: data/Surge_Frames/Bleeding_Dataset_70_30/clips_64f/train_dense_64f_detailed.csv
    dataset_val: data/Surge_Frames/Bleeding_Dataset_70_30/clips_64f/test_dense_64f_detailed.csv
    frames_per_clip: 64
    num_classes: 2
    num_segments: 1
    num_views_per_segment: 1
    resolution: 224

  optimization:
    batch_size: 4
    multihead_kwargs:
    # Classifier 0
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.01
    # Classifier 1
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.003
      start_lr: 0.003
      warmup: 0.0
      weight_decay: 0.01
    # Classifier 2
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.01
    # Classifier 3
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.01
    # Classifier 4
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.01
    # Classifier 5
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.1
    # Classifier 6
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.003
      start_lr: 0.003
      warmup: 0.0
      weight_decay: 0.1
    # Classifier 7
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.1
    # Classifier 8
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.1
    # Classifier 9
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.1
    # Classifier 10
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.4
    # Classifier 11
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.003
      start_lr: 0.003
      warmup: 0.0
      weight_decay: 0.4
    # Classifier 12
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.4
    # Classifier 13
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.4
    # Classifier 14
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.4
    # Classifier 15
    - final_lr: 0.0
      final_weight_decay: 0.8
      lr: 0.005
      start_lr: 0.005
      warmup: 0.0
      weight_decay: 0.8
    num_epochs: 1
    use_bfloat16: true
    use_pos_embed: false
    use_weighted_loss: true

model_kwargs:
  checkpoint: null
  module_name: evals.foundation_phase_probing.modelcustom.foundation_model_wrapper
  model_type: surgenet
  encoder:
    model_name: surgenet_convnextv2
  wrapper_kwargs:
    tubelet_size: 2
    max_frames: 128
    use_pos_embed: true