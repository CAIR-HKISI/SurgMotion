cpus_per_task: 2
eval_name: surgical_video_probing
dataset: aIxsuture_phases  # Dataset name for wandb logging
folder: logs/surgical_ntp_vitl16-256px-64f_lr1e-4_epoch-10_21-dataset_20epoch_window_predict/autolapro
mem_per_gpu: 220G
nodes: 1
max_workers: 4
num_workers: 8
resume_checkpoint: false
tag: aIxsuture-probing
tasks_per_node: 1

# Bootstrap configuration (default: enabled)
use_bootstrap: true
n_bootstrap: 1000
bootstrap_seed: 42

# wandb configuration
wandb:
  project: nsjepa-probing-cb-softmax  # Your wandb project name
  entity: nsjepa  # Your wandb username or team (optional, uses default if null)
  name: aIxsuture_probing  # Run name (optional, wandb will generate if null)
  tags:
    - aIxsuture
    - skill level recognition
    - vitl
  group: null  # Group name for grouping related runs (optional)
  notes: "Multi-head probing on aIxsuture dataset with bootstrap uncertainty estimation"

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical_videodataset

    # Single dataset (aIxsuture)
    dataset_train:
    - data/Surge_Frames/AIxsuture_v1/train_clip_metadata.csv

    dataset_val:
    - data/Surge_Frames/AIxsuture_v1/test_clip_metadata.csv

    # Number of classes for aIxsuture
    num_classes:
    - 3   # aIxsuture has 3 skill levels

    frames_per_clip: 64
    num_segments: 5
    num_views_per_segment: 1
    resolution: 256

  optimization:
    batch_size: 2
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0003
      start_lr: 0.0003
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 5.0e-05
      start_lr: 5.0e-05
      warmup: 0.0
      weight_decay: 0.4
    num_epochs: 20
    use_bfloat16: true
    use_pos_embed: false

    loss_type: cb_softmax
    loss_beta: 0.9999
    loss_gamma: 2.0

model_kwargs:
  checkpoint: logs/surgical_ntp_vitl16-256px-64f_lr1e-4_epoch-10_21-dataset_20epoch_window_predict/latest.pt
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
